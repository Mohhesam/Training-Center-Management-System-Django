<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Training Center Admin Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f6f9;
            height:100vh;
        }

        .login-card{
            width:430px;
            border:none;
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.12);
        }

        .login-header{
            background:#212529;
            color:white;
            padding:35px;
            text-align:center;
        }

        .login-header i{
            font-size:45px;
        }

        .login-header h2{
            margin-top:15px;
            font-weight:700;
        }

        .login-header p{
            color:#ced4da;
            margin-bottom:0;
        }

        .form-control{
            border-radius:10px;
            padding:12px;
        }

        .btn-login{
            border-radius:10px;
            padding:12px;
            font-weight:600;
        }

        .footer-text{
            color:#6c757d;
            font-size:14px;
            text-align:center;
            margin-top:25px;
        }

    </style>

</head>

<body>

<div class="container h-100">

    <div class="row h-100 justify-content-center align-items-center">

        <div class="col-auto">

            <div class="card login-card">

                <div class="login-header">

                    <i class="bi bi-mortarboard-fill"></i>

                    <h2>Training Center</h2>

                    <p>Administration Portal</p>

                </div>

                <div class="card-body p-4">

                    {% if form.errors %}

                        <div class="alert alert-danger">

                            Invalid username or password.

                        </div>

                    {% endif %}

                    <form method="post">

                        {% csrf_token %}

                        {% if next %}
                            <input type="hidden" name="next" value="{{ next }}">
                        {% endif %}

                        <div class="mb-3">

                            <label class="form-label fw-semibold">

                                Username

                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                                placeholder="Enter username"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter password"
                                required>

                        </div>

                        {% if next %}
                            <input type="hidden" name="next" value="{{ next }}">
                        {% endif %}

                        <button
                            class="btn btn-dark btn-login w-100">

                            <i class="bi bi-box-arrow-in-right"></i>

                            Login

                        </button>

                    </form>

                    <div class="footer-text">

                        Only authorized administrators can access the dashboard.

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
