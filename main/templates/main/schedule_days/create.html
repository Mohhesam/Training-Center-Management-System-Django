<!DOCTYPE html>
<html>

<head>

    <title>Schedule Days</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow">

    <div class="container">

        <span class="navbar-brand fw-bold">

            <i class="bi bi-mortarboard-fill"></i>

            Training Center Admin

        </span>

    </div>

</nav>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow border-0">

                <div class="card-header bg-white py-4">

                    <h2 class="fw-bold">

                        Course Schedule Days

                    </h2>

                    <p class="text-muted mb-0">

                        Add one or more weekly sessions for a course schedule.

                    </p>

                </div>

                <div class="card-body">

                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Course Schedule

                            </label>

                            <select
                                name="schedule"
                                class="form-select"
                                required>

                                <option value="">

                                    Select Schedule

                                </option>

                                {% for schedule in schedules %}

                                <option value="{{ schedule.id }}">

                                    {{ schedule.course.title }}
                                    -
                                    {{ schedule.start_date }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <hr>

                        <div id="days-container">

                            <div class="border rounded p-4 mb-4 day-block">

                                <h5>

                                    Session #1

                                </h5>

                                <div class="row">

                                    <div class="col-md-4">

                                        <label class="form-label">

                                            Day

                                        </label>

                                        <select
                                            class="form-select"
                                            name="day[]"
                                            required>

                                            <option value="">

                                                Select Day

                                            </option>

                                            <option>Sunday</option>
                                            <option>Monday</option>
                                            <option>Tuesday</option>
                                            <option>Wednesday</option>
                                            <option>Thursday</option>
                                            <option>Friday</option>
                                            <option>Saturday</option>

                                        </select>

                                    </div>

                                    <div class="col-md-4">

                                        <label class="form-label">

                                            Start Time

                                        </label>

                                        <input
                                            type="time"
                                            class="form-control"
                                            name="start_time[]"
                                            required>

                                    </div>

                                    <div class="col-md-4">

                                        <label class="form-label">

                                            End Time

                                        </label>

                                        <input
                                            type="time"
                                            class="form-control"
                                            name="end_time[]"
                                            required>

                                    </div>

                                </div>

                            </div>

                        </div>

                        <button
                            type="button"
                            id="add-day"
                            class="btn btn-outline-primary mb-4">

                            <i class="bi bi-plus-circle"></i>

                            Add Another Session

                        </button>

                        <div class="text-end">

                            <a
                                href="{% url 'admin_dashboard' %}"
                                class="btn btn-secondary">

                                Cancel

                            </a>

                            <button
                                class="btn btn-success px-4">

                                Save

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

let count = 2;

document
.getElementById("add-day")
.addEventListener("click", function () {

    document
    .getElementById("days-container")
    .insertAdjacentHTML(

        "beforeend",

        `
        <div class="border rounded p-4 mb-4 day-block">

            <h5>

                Session #${count}

            </h5>

            <div class="row">

                <div class="col-md-4">

                    <label class="form-label">

                        Day

                    </label>

                    <select
                        class="form-select"
                        name="day[]"
                        required>

                        <option value="">

                            Select Day

                        </option>

                        <option>Sunday</option>
                        <option>Monday</option>
                        <option>Tuesday</option>
                        <option>Wednesday</option>
                        <option>Thursday</option>
                        <option>Friday</option>
                        <option>Saturday</option>

                    </select>

                </div>

                <div class="col-md-4">

                    <label class="form-label">

                        Start Time

                    </label>

                    <input
                        type="time"
                        class="form-control"
                        name="start_time[]"
                        required>

                </div>

                <div class="col-md-4">

                    <label class="form-label">

                        End Time

                    </label>

                    <input
                        type="time"
                        class="form-control"
                        name="end_time[]"
                        required>

                </div>

            </div>

        </div>
        `

    );

    count++;

});

</script>

</body>

</html>
